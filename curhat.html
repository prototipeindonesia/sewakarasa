<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruang Cerita - Sewaka Rasa</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Identitas Warna Sewaka Rasa */
            --primary-deep: #1E3A8A;
            --primary-soft: #3B82F6;
            --accent-safe: #10B981;
            --bg-calm: #F8FAFC;
            --white: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-calm);
            color: var(--text-main);
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 110px;
        }

        /* Header Konsisten */
        header {
            padding: 30px 20px;
            background: linear-gradient(135deg, var(--primary-deep) 0%, var(--primary-soft) 100%);
            border-bottom-left-radius: 35px;
            border-bottom-right-radius: 35px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 25px rgba(30, 58, 138, 0.1);
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px;
            border-radius: 12px;
            color: white;
            display: flex;
            text-decoration: none;
        }

        header h1 { font-size: 1.2rem; font-weight: 800; }

        .container { padding: 25px 20px; }

        /* Mood Selector */
        .mood-card {
            background: var(--white);
            padding: 22px;
            border-radius: 28px;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.02);
            border: 1px solid #F1F5F9;
        }

        .mood-card p {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 18px;
            color: var(--text-muted);
            text-align: center;
        }

        .mood-options {
            display: flex;
            justify-content: space-between;
            gap: 5px;
        }

        .mood-item {
            cursor: pointer;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.4;
            flex: 1;
            padding: 10px 5px;
            border-radius: 18px;
        }

        .mood-item.active {
            opacity: 1;
            background: #EFF6FF;
            transform: translateY(-5px);
        }

        .mood-emoji { font-size: 1.8rem; margin-bottom: 8px; display: block; }
        .mood-item span { font-size: 0.65rem; font-weight: 800; color: var(--primary-deep); }

        /* Input Area */
        .input-area {
            background: var(--white);
            border-radius: 28px;
            padding: 22px;
            box-shadow: 0 12px 30px rgba(30, 58, 138, 0.05);
            border: 1px solid #F1F5F9;
        }

        .curhat-textarea {
            width: 100%;
            height: 280px;
            border: none;
            outline: none;
            resize: none;
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-main);
            background: transparent;
            font-weight: 500;
        }

        .curhat-textarea::placeholder { color: #CBD5E1; }

        .footer-note {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #F1F5F9;
        }

        .privacy-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: var(--accent-safe);
            font-weight: 700;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 18px;
            background: var(--primary-deep);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 800;
            margin-top: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 25px rgba(30, 58, 138, 0.2);
            transition: 0.3s;
        }

        .btn-submit:active { transform: scale(0.96); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px;
            background: var(--white); display: flex; justify-content: space-around;
            padding: 15px 10px 30px; border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.05); z-index: 100;
        }
        .nav-link {
            text-decoration: none; color: #CBD5E1; display: flex;
            flex-direction: column; align-items: center; gap: 6px; font-size: 0.65rem; font-weight: 700;
        }
        .nav-link.active { color: var(--primary-deep); }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">
            <i data-lucide="chevron-left" size="20"></i>
        </a>
        <h1>Ruang Cerita</h1>
    </header>

    <div class="container">
        <div class="mood-card">
            <p>Apa yang kamu rasakan saat ini?</p>
            <div class="mood-options">
                <div class="mood-item" onclick="selectMood(this)">
                    <span class="mood-emoji">😊</span>
                    <span>Lega</span>
                </div>
                <div class="mood-item active" onclick="selectMood(this)">
                    <span class="mood-emoji">😐</span>
                    <span>Biasa</span>
                </div>
                <div class="mood-item" onclick="selectMood(this)">
                    <span class="mood-emoji">😔</span>
                    <span>Sedih</span>
                </div>
                <div class="mood-item" onclick="selectMood(this)">
                    <span class="mood-emoji">😤</span>
                    <span>Marah</span>
                </div>
                <div class="mood-item" onclick="selectMood(this)">
                    <span class="mood-emoji">😰</span>
                    <span>Cemas</span>
                </div>
            </div>
        </div>

        <div class="input-area">
            <textarea class="curhat-textarea" placeholder="Tuliskan apa pun yang ada di pikiranmu... Ruang ini aman untukmu bercerita."></textarea>
            
            <div class="footer-note">
                <div class="privacy-label">
                    <i data-lucide="shield-check" size="14"></i>
                    <span>Privasi Terjaga</span>
                </div>
                <span style="font-size: 0.65rem; color: var(--text-muted); font-weight: 600;">Kesehatan mentalmu berharga ✨</span>
            </div>
        </div>

        <button class="btn-submit" onclick="submitCurhat()">
            Simpan Cerita
            <i data-lucide="heart" size="18"></i>
        </button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link">
            <i data-lucide="home"></i>
            <span>Beranda</span>
        </a>
        <a href="curhat.html" class="nav-link active">
            <i data-lucide="message-square"></i>
            <span>Curhat</span>
        </a>
        <a href="edukasi.html" class="nav-link">
            <i data-lucide="book-open"></i>
            <span>Edukasi</span>
        </a>
        <a href="profil.html" class="nav-link">
            <i data-lucide="user"></i>
            <span>Profil</span>
        </a>
    </nav>

    <script>
        lucide.createIcons();

        function selectMood(element) {
            document.querySelectorAll('.mood-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
        }

        function submitCurhat() {
            const text = document.querySelector('.curhat-textarea').value;
            if(text.trim() === "") {
                alert("Jangan ragu, tuliskan sedikit apa yang kamu rasakan ya...");
                return;
            }
            alert("Terima kasih sudah berani bercerita. Melepaskan beban pikiran adalah langkah awal yang luar biasa.");
            window.location.href = "pantauriwayat.html";
        }
    </script>
</body>
</html>
