<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sewaka Rasa - Berani Bicara, Stop Bullying</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Warna Identitas Sewaka Rasa */
            --primary-deep: #1E3A8A; 
            --primary-soft: #3B82F6; 
            --accent-safe: #10B981;  
            --danger-soft: #FEE2E2;
            --danger-text: #EF4444;
            --bg-calm: #F8FAFC;
            --white: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-calm);
            color: var(--text-main);
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 110px;
        }

        /* Header */
        header {
            padding: 40px 20px 30px;
            background: linear-gradient(135deg, var(--primary-deep) 0%, var(--primary-soft) 100%);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            color: white;
            box-shadow: 0 10px 25px rgba(30, 58, 138, 0.15);
        }

        .header-top {
            display: flex; justify-content: space-between; align-items: flex-start;
        }

        .user-greeting h1 { font-size: 1.4rem; font-weight: 800; }
        .user-greeting p { font-size: 0.85rem; opacity: 0.9; margin-top: 4px; font-weight: 500; }
        .tagline-small { font-size: 0.7rem; font-weight: 700; color: #FCD34D; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; }

        .notif-badge {
            background: rgba(255,255,255,0.2);
            padding: 10px; border-radius: 15px; color: white; border: none;
        }

        .container { padding: 0 20px; margin-top: -25px; }

        /* Card System */
        .card {
            background: var(--white);
            border-radius: 28px;
            padding: 22px;
            margin-bottom: 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.04);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .card-title { font-size: 0.95rem; font-weight: 800; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; }

        /* Mood Check-in */
        .mood-grid { display: flex; justify-content: space-between; gap: 10px; }
        .mood-item {
            flex: 1; border: none; background: #F1F5F9; padding: 12px 5px; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 8px; transition: 0.3s;
        }
        .mood-item:active { transform: scale(0.9); background: var(--primary-soft); color: white; }
        .mood-emoji { font-size: 1.5rem; }
        .mood-label { font-size: 0.65rem; font-weight: 700; }

        /* Feature Grid */
        .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .feature-card {
            background: var(--white); padding: 20px; border-radius: 24px;
            text-decoration: none; color: var(--text-main);
            display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #F1F5F9;
            transition: 0.2s;
        }
        .feature-card:active { transform: translateY(2px); background: #F8FAFC; }
        .feature-card i { color: var(--primary-soft); }
        .feature-card span { font-size: 0.85rem; font-weight: 700; }

        /* Emergency & Highlighted */
        .feature-card.emergency { background: #FFF1F2; border: 1px solid #FECDD3; }
        .feature-card.emergency i { color: var(--danger-text); }
        .feature-card.emergency p { font-size: 0.65rem; color: var(--text-muted); font-weight: 500; margin-top: -8px; }

        /* Banner Edukasi */
        .banner-edu {
            background: linear-gradient(135deg, var(--accent-safe), #059669);
            padding: 20px; border-radius: 24px; margin-top: 20px;
            display: flex; align-items: center; gap: 15px; text-decoration: none; color: white;
        }
        .banner-icon { background: rgba(255,255,255,0.2); padding: 12px; border-radius: 18px; }
        .banner-info h4 { font-size: 0.9rem; font-weight: 800; }
        .banner-info p { font-size: 0.75rem; opacity: 0.9; }

        /* Navigasi Bawah */
        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px;
            background: var(--white); display: flex; justify-content: space-around;
            padding: 15px 10px 30px; border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.05); z-index: 100;
        }
        .nav-link {
            text-decoration: none; color: #CBD5E1; display: flex;
            flex-direction: column; align-items: center; gap: 6px; font-size: 0.65rem; font-weight: 700;
        }
        .nav-link.active { color: var(--primary-deep); }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="user-greeting">
                <span class="tagline-small">Berani Bicara, Stop Bullying</span>
                <h1>Halo, Kadek! 👋</h1>
                <p>Bagaimana kabarmu di sekolah hari ini?</p>
            </div>
            <button class="notif-badge"><i data-lucide="bell" size="20"></i></button>
        </div>
    </header>

    <div class="container">
        <section class="card">
            <div class="card-title">Check-in Perasaan</div>
            <div class="mood-grid">
                <button class="mood-item" onclick="recordMood('Senang')">
                    <span class="mood-emoji">😊</span>
                    <span class="mood-label">Senang</span>
                </button>
                <button class="mood-item" onclick="recordMood('Biasa')">
                    <span class="mood-emoji">😐</span>
                    <span class="mood-label">Biasa</span>
                </button>
                <button class="mood-item" onclick="recordMood('Cemas')">
                    <span class="mood-emoji">😟</span>
                    <span class="mood-label">Cemas</span>
                </button>
                <button class="mood-item" onclick="location.href='bantuandarurat.html'">
                    <span class="mood-emoji">🆘</span>
                    <span class="mood-label">Krisis</span>
                </button>
            </div>
        </section>

        <div class="feature-grid">
            <a href="bantuandarurat.html" class="feature-card emergency">
                <i data-lucide="heart-pulse"></i>
                <span>Bantuan Darurat</span>
                <p>Layanan Hotline 24 Jam</p>
            </a>
            <a href="relawan.html" class="feature-card">
                <i data-lucide="users"></i>
                <span>Relawan Sebaya</span>
            </a>
            <a href="caripsikolog.html" class="feature-card">
                <i data-lucide="search"></i>
                <span>Cari Psikolog</span>
            </a>
            <a href="pantauriwayat.html" class="feature-card">
                <i data-lucide="bar-chart-3"></i>
                <span>Riwayat Mood</span>
            </a>
        </div>

        <a href="edukasi.html" class="banner-edu">
            <div class="banner-icon"><i data-lucide="shield-check" size="28"></i></div>
            <div class="banner-info">
                <h4>Kenali & Lawan Bullying</h4>
                <p>Pahami hakmu dan cara melapor aman.</p>
            </div>
            <i data-lucide="chevron-right" style="margin-left: auto;"></i>
        </a>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link active">
            <i data-lucide="home"></i>
            <span>Beranda</span>
        </a>
        <a href="curhat.html" class="nav-link">
            <i data-lucide="message-square"></i>
            <span>Curhat</span>
        </a>
        <a href="edukasi.html" class="nav-link">
            <i data-lucide="book-open"></i>
            <span>Edukasi</span>
        </a>
        <a href="profil.html" class="nav-link">
            <i data-lucide="user"></i>
            <span>Profil</span>
        </a>
    </nav>

    <script>
        lucide.createIcons();

        function recordMood(mood) {
            alert(`Terima kasih sudah jujur, Kadek. Perasaan "${mood}" kamu telah dicatat.`);
        }
    </script>
</body>
</html>
