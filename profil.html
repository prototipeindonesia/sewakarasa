<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - Sewaka Rasa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #4A90E2;
            --secondary: #E3F2FD;
            --accent: #6FCF97;
            --danger: #EB5757;
            --text-dark: #2D3436;
            --text-light: #636E72;
            --bg: #F0F7FF;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-dark);
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            /* Jarak bawah ekstra agar tidak menumpuk dengan nav */
            padding-bottom: 120px; 
        }

        /* Header Fix */
        header {
            padding: 50px 20px 60px; /* Padding bawah dikurangi */
            background: linear-gradient(135deg, var(--primary) 0%, #357ABD 100%);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            text-align: center;
            color: white;
            position: relative;
            z-index: 1;
        }

        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: var(--white);
            border-radius: 35px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .profile-avatar i { color: var(--primary); }

        header h1 { font-size: 1.4rem; margin-bottom: 5px; }
        header p { font-size: 0.85rem; opacity: 0.9; }

        /* Container & Spacing Fix */
        .container {
            padding: 0 20px;
            margin-top: -30px; /* Jarak tumpuk diperhalus */
            position: relative;
            z-index: 2;
        }

        /* Stats Card */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--white);
            padding: 15px 10px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        .stat-card h3 { font-size: 1.1rem; color: var(--primary); }
        .stat-card p { font-size: 0.65rem; color: var(--text-light); font-weight: 600; margin-top: 2px; }

        /* Badge Section */
        .section-card {
            background: var(--white);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge-grid {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 5px 5px 15px 5px; /* Tambah padding agar shadow tidak terpotong */
            scrollbar-width: none;
        }

        .badge-item {
            flex-shrink: 0;
            width: 70px;
            text-align: center;
        }

        .badge-icon {
            width: 50px;
            height: 50px;
            background: #FFF9C4;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            color: #FBC02D;
            box-shadow: 0 4px 10px rgba(251, 192, 45, 0.2);
        }

        .badge-item span { font-size: 0.6rem; font-weight: 600; color: var(--text-light); line-height: 1.2; display: block; }

        /* Menu List */
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .menu-btn {
            background: var(--white);
            padding: 16px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: var(--text-dark);
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .menu-btn:active { background: #f0f4f8; transform: scale(0.98); }
        .menu-btn i.icon-left { color: var(--primary); opacity: 0.8; }
        .menu-btn span { flex: 1; font-size: 0.85rem; font-weight: 500; }
        .menu-btn i.icon-chevron { color: #B2BEC3; }

        .logout-btn { 
            margin-top: 10px;
            border: 1px solid rgba(235, 87, 87, 0.1);
        }
        .logout-btn span { color: var(--danger); }
        .logout-btn i.icon-left { color: var(--danger) !important; }

        /* Bottom Nav Fix */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 15px 10px 30px; /* Padding bawah ditambah untuk kenyamanan */
            border-radius: 25px 25px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.08);
            z-index: 100;
        }

        .nav-link {
            text-decoration: none;
            color: #B2BEC3;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.65rem;
            font-weight: 500;
            gap: 5px;
        }

        .nav-link.active { color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <button class="settings-btn"><i data-lucide="settings" size="20"></i></button>
        <div class="profile-avatar">
            <i data-lucide="user" size="48"></i>
        </div>
        <h1>Kadek Wijaya</h1>
        <p>Kelas XI - SMA Negeri 1 Denpasar</p>
    </header>

    <div class="container">
        <div class="stats-row">
            <div class="stat-card">
                <h3>12</h3>
                <p>Curhat</p>
            </div>
            <div class="stat-card">
                <h3>5</h3>
                <p>Lencana</p>
            </div>
            <div class="stat-card">
                <h3>85%</h3>
                <p>Mood Skor</p>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">
                <span>Lencana Saya</span>
                <a href="#" style="font-size: 0.7rem; color: var(--primary); text-decoration: none; font-weight: 600;">Lihat Semua</a>
            </div>
            <div class="badge-grid">
                <div class="badge-item">
                    <div class="badge-icon"><i data-lucide="award" size="20"></i></div>
                    <span>Berani Bicara</span>
                </div>
                <div class="badge-item">
                    <div class="badge-icon" style="background: #E8F5E9; color: #2E7D32;"><i data-lucide="smile" size="20"></i></div>
                    <span>Mood Stabil</span>
                </div>
                <div class="badge-item">
                    <div class="badge-icon" style="background: #E3F2FD; color: #1565C0;"><i data-lucide="book-open" size="20"></i></div>
                    <span>Pembelajar</span>
                </div>
                <div class="badge-item">
                    <div class="badge-icon" style="background: #F3E5F5; color: #7B1FA2;"><i data-lucide="shield" size="20"></i></div>
                    <span>Anti Bully</span>
                </div>
            </div>
        </div>

        <div class="menu-list">
            <a href="#" class="menu-btn">
                <i data-lucide="user-cog" class="icon-left" size="20"></i>
                <span>Pengaturan Profil</span>
                <i data-lucide="chevron-right" class="icon-chevron" size="18"></i>
            </a>
            <a href="#" class="menu-btn">
                <i data-lucide="shield-check" class="icon-left" size="20"></i>
                <span>Keamanan & Privasi</span>
                <i data-lucide="chevron-right" class="icon-chevron" size="18"></i>
            </a>
            <a href="#" class="menu-btn">
                <i data-lucide="help-circle" class="icon-left" size="20"></i>
                <span>Pusat Bantuan</span>
                <i data-lucide="chevron-right" class="icon-chevron" size="18"></i>
            </a>
            <a href="login.html" class="menu-btn logout-btn">
                <i data-lucide="log-out" class="icon-left" size="20"></i>
                <span>Keluar Aplikasi</span>
            </a>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link">
            <i data-lucide="home"></i>
            <span>Beranda</span>
        </a>
        <a href="curhat.html" class="nav-link">
            <i data-lucide="message-circle"></i>
            <span>Curhat</span>
        </a>
        <a href="pantauriwayat.html" class="nav-link">
            <i data-lucide="history"></i>
            <span>Riwayat</span>
        </a>
        <a href="profil.html" class="nav-link active">
            <i data-lucide="user"></i>
            <span>Profil</span>
        </a>
    </nav>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
