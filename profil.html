<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - Sewaka Rasa</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Identitas Warna Sewaka Rasa */
            --primary-deep: #1E3A8A;
            --primary-soft: #3B82F6;
            --accent-safe: #10B981;
            --danger-text: #EF4444;
            --bg-calm: #F8FAFC;
            --white: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-calm);
            color: var(--text-main);
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 120px; 
        }

        /* Header Profil Modern */
        header {
            padding: 50px 20px 70px;
            background: linear-gradient(135deg, var(--primary-deep) 0%, var(--primary-soft) 100%);
            border-bottom-left-radius: 45px;
            border-bottom-right-radius: 45px;
            text-align: center;
            color: white;
            position: relative;
        }

        .settings-btn {
            position: absolute; top: 25px; right: 20px;
            background: rgba(255,255,255,0.2);
            border: none; padding: 10px; border-radius: 15px;
            color: white; cursor: pointer;
        }

        .profile-avatar {
            width: 110px; height: 110px;
            background: var(--white);
            border-radius: 35px;
            margin: 0 auto 18px;
            display: flex; align-items: center; justify-content: center;
            border: 5px solid rgba(255,255,255,0.25);
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
        }

        .profile-avatar i { color: var(--primary-soft); }

        header h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
        header p { font-size: 0.85rem; font-weight: 500; opacity: 0.9; }

        .container {
            padding: 0 20px;
            margin-top: -35px;
            position: relative;
        }

        /* Stats Card */
        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; margin-bottom: 25px;
        }

        .stat-card {
            background: var(--white);
            padding: 18px 10px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border: 1px solid #F1F5F9;
        }

        .stat-card h3 { font-size: 1.2rem; color: var(--primary-deep); font-weight: 800; }
        .stat-card p { font-size: 0.65rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin-top: 4px; }

        /* Lencana Section */
        .section-card {
            background: var(--white);
            border-radius: 28px;
            padding: 22px;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.02);
            border: 1px solid #F1F5F9;
        }

        .section-title {
            font-size: 0.9rem; font-weight: 800;
            margin-bottom: 18px; display: flex;
            justify-content: space-between; align-items: center;
        }

        .badge-scroll {
            display: flex; gap: 18px; overflow-x: auto;
            padding: 5px 5px 15px; scrollbar-width: none;
        }

        .badge-item { flex-shrink: 0; width: 75px; text-align: center; }

        .badge-icon {
            width: 55px; height: 55px;
            background: #FEF3C7; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 10px; color: #D97706;
            box-shadow: 0 6px 15px rgba(217, 119, 6, 0.15);
        }

        .badge-item span { font-size: 0.65rem; font-weight: 700; color: var(--text-muted); line-height: 1.3; display: block; }

        /* Menu List Modern */
        .menu-group { display: flex; flex-direction: column; gap: 12px; }

        .menu-item {
            background: var(--white);
            padding: 18px 20px;
            border-radius: 22px;
            display: flex; align-items: center; gap: 15px;
            text-decoration: none; color: var(--text-main);
            transition: 0.3s;
            border: 1px solid #F1F5F9;
        }

        .menu-item:active { transform: scale(0.97); background: #F8FAFC; }
        .menu-item i.lead-icon { color: var(--primary-soft); }
        .menu-item span { flex: 1; font-size: 0.85rem; font-weight: 700; }
        .menu-item i.chevron { color: #CBD5E1; }

        .logout-item { border: 1px solid rgba(239, 68, 68, 0.1); }
        .logout-item span { color: var(--danger-text); }
        .logout-item i.lead-icon { color: var(--danger-text) !important; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px;
            background: var(--white); display: flex; justify-content: space-around;
            padding: 15px 10px 30px; border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.05); z-index: 100;
        }
        .nav-link {
            text-decoration: none; color: #CBD5E1; display: flex;
            flex-direction: column; align-items: center; gap: 6px; font-size: 0.65rem; font-weight: 700;
        }
        .nav-link.active { color: var(--primary-deep); }
    </style>
</head>
<body>

    <header>
        <button class="settings-btn"><i data-lucide="settings" size="22"></i></button>
        <div class="profile-avatar">
            <i data-lucide="user-round" size="55"></i>
        </div>
        <h1>Kadek Wijaya</h1>
        <p>Kelas XI • SMA Negeri 1 Denpasar</p>
    </header>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>12</h3>
                <p>Cerita</p>
            </div>
            <div class="stat-card">
                <h3>5</h3>
                <p>Lencana</p>
            </div>
            <div class="stat-card">
                <h3>85%</h3>
                <p>Kesejahteraan</p>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">
                <span>Lencana Saya</span>
                <a href="#" style="font-size: 0.7rem; color: var(--primary-soft); text-decoration: none; font-weight: 700;">Lihat Semua</a>
            </div>
            <div class="badge-scroll">
                <div class="badge-item">
                    <div class="badge-icon"><i data-lucide="award" size="22"></i></div>
                    <span>Berani Bicara</span>
                </div>
                <div class="badge-item">
                    <div class="badge-icon" style="background: #DCFCE7; color: #16A34A;"><i data-lucide="sparkles" size="22"></i></div>
                    <span>Mood Stabil</span>
                </div>
                <div class="badge-item">
                    <div class="badge-icon" style="background: #DBEAFE; color: #2563EB;"><i data-lucide="book-open-check" size="22"></i></div>
                    <span>Pembelajar</span>
                </div>
                <div class="badge-item">
                    <div class="badge-icon" style="background: #F3E8FF; color: #9333EA;"><i data-lucide="shield-check" size="22"></i></div>
                    <span>Anti Bully</span>
                </div>
            </div>
        </div>

        <div class="menu-group">
            <a href="#" class="menu-item">
                <i data-lucide="user-cog" class="lead-icon" size="20"></i>
                <span>Pengaturan Akun</span>
                <i data-lucide="chevron-right" class="chevron" size="18"></i>
            </a>
            <a href="#" class="menu-item">
                <i data-lucide="lock" class="lead-icon" size="20"></i>
                <span>Keamanan & Privasi</span>
                <i data-lucide="chevron-right" class="chevron" size="18"></i>
            </a>
            <a href="#" class="menu-item">
                <i data-lucide="info" class="lead-icon" size="20"></i>
                <span>Tentang Sewaka Rasa</span>
                <i data-lucide="chevron-right" class="chevron" size="18"></i>
            </a>
            <a href="login.html" class="menu-item logout-item">
                <i data-lucide="log-out" class="lead-icon" size="20"></i>
                <span>Keluar Aplikasi</span>
            </a>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link">
            <i data-lucide="home"></i>
            <span>Beranda</span>
        </a>
        <a href="caripsikolog.html" class="nav-link">
            <i data-lucide="user-search"></i>
            <span>Psikolog</span>
        </a>
        <a href="edukasi.html" class="nav-link">
            <i data-lucide="book-open"></i>
            <span>Edukasi</span>
        </a>
        <a href="profil.html" class="nav-link active">
            <i data-lucide="user"></i>
            <span>Profil</span>
        </a>
    </nav>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
